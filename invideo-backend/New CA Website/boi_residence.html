<!DOCTYPE html>
<html lang="en">
<head>
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BOI Residence Verification Form</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
</head>
<body>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 10px;
    padding: 0;
  }
  form {
    max-width: 100%;
  }
  label {
    font-weight: bold;
    display: block;
    margin-top: 10px;
  }
  input, select, textarea {
    width: 100%;
    padding: 8px;
    margin-top: 5px;
    margin-bottom: 10px;
    box-sizing: border-box;
    border: 1px solid #ccc;
    border-radius: 5px;
  }
  button {
    background-color: #2c3e50;
    color: #fff;
    padding: 10px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    width: 100%;
    font-size: 16px;
  }
  button:hover {
    background-color: #1a242f;
  }
  .error {
    color: red;
    font-size: 13px;
    margin-top: -8px;
    margin-bottom: 5px;
    display: none;
  }
  .ref-row {
  display: flex;
  gap: 10px;
  margin-bottom: 10px;
}

.ref-row input {
  width: 50%;
}

</style>

<h2>Bank of India - Residence Verification Form</h2>
<form id="resForm">

    <label>Applicant Name:</label>
    <input type="text" id="applicant_name">

    <label>Present Residence Address:</label>
    <input type="text" id="present_address">

    <label>Applicant's Residence Landmark:</label>
    <input type="text" id="landmark">

    <label>Stay Confirmed:</label>
    <select id="stay_confirmed">
      <option selected>Yes</option>
      <option>No</option>
    </select>

    <label>Staying Since:</label>
    <input type="text" id="staying_since">

    <label>Name Plate Seen?</label>
    <select id="name_plate">
      <option>Yes</option>
      <option selected>No</option>
    </select>

    <label>Name on Plate Tally?</label>
    <select id="plate_tally">
      <option>Yes</option>
      <option selected>No</option>
    </select>

    <label>Nature of Residence:</label>
    <select id="nature_residence" onchange="toggleOtherNature()">
      <option>Own House</option>
      <option>Family Owned</option>
      <option>Paying Guest (PG)</option>
      <option>Company Quarters</option>
      <option>Rental</option>
      <option>Other</option>
    </select>
    <input type="text" id="other_nature" placeholder="Specify Nature" style="display:none; margin-top:5px;">

<label style="margin-top:15px;">Reference Details (Mandatory)</label>

<b>1. Reference Name & Number</b>
<div class="ref-row">
  <input type="text" id="ref1_name" placeholder="Name">
  <input type="text" id="ref1_number" placeholder="Number">
</div>
<div id="ref1_error" class="error">Reference 1 Name & Number is mandatory.</div>

<b>2. Reference Name & Number</b>
<div class="ref-row">
  <input type="text" id="ref2_name" placeholder="Name">
  <input type="text" id="ref2_number" placeholder="Number">
</div>
<div id="ref2_error" class="error">Reference 2 Name & Number is mandatory.</div>


    <label>Name & Address of Person Contacted:</label>
    <input type="text" id="person_contacted">

    <label>Relation with Applicant:</label>
    <select id="relation" onchange="toggleOtherRelation()">
      <option>Self</option>
      <option>Wife</option>
      <option>Son</option>
      <option>Father</option>
      <option>Mother</option>
      <option>Sister</option>
      <option>Brother</option>
      <option>Uncle</option>
      <option>Neighbourhood</option>
      <option>Tenanted</option>
      <option>Other</option>
    </select>
    <input type="text" id="other_relation" placeholder="Specify Relation" style="display:none; margin-top:5px;">

    <label>Name of Verifier & Remarks:</label>
    <input type="text" id="verifier_res" placeholder="Type Verifier Name">
    <small>Or choose below (optional)</small>
    <select id="verifier_select">
      <option value="">Select Verifier Name (optional)</option>
      <option>Dheeraj</option>
      <option>Sumit</option>
      <option>Varun Michael</option>
      <option>Pankaj Dixit</option>
      <option>Rohit</option>
      <option>Ravi</option>
      <option>Sunil</option>
      <option>Rakesh</option>
      <option>Bittoo Rajput</option>
      <option>Ajay Sharma</option>
      <option>Badan Singh</option>
      <option>Amit Kumar</option>
    </select>

    <label>Additional Remarks / Notes:</label>
    <textarea id="remarks" rows="4" cols="50"></textarea>

    <button type="button" onclick="generatePDF()">Download BOI Residence Verification PDF</button>
</form>

<script>
function toggleOtherNature() {
  const select = document.getElementById("nature_residence");
  const input = document.getElementById("other_nature");
  input.style.display = (select.value === "Other") ? "block" : "none";
}

function toggleOtherRelation() {
  const select = document.getElementById("relation");
  const input = document.getElementById("other_relation");
  input.style.display = (select.value === "Other") ? "block" : "none";
}

function getIndiaDate() {
  let options = { timeZone: 'Asia/Kolkata', day: '2-digit', month: '2-digit', year: 'numeric' };
  return new Intl.DateTimeFormat('en-GB', options).format(new Date());
}

async function generatePDF() {
  let ref1Name = document.getElementById("ref1_name").value.trim();
  let ref1Number = document.getElementById("ref1_number").value.trim();
  let ref2Name = document.getElementById("ref2_name").value.trim();
  let ref2Number = document.getElementById("ref2_number").value.trim();

  let valid = true;

  if (!ref1Name || !ref1Number) {
    document.getElementById("ref1_error").style.display = "block";
    valid = false;
  } else {
    document.getElementById("ref1_error").style.display = "none";
  }

  if (!ref2Name || !ref2Number) {
    document.getElementById("ref2_error").style.display = "block";
    valid = false;
  } else {
    document.getElementById("ref2_error").style.display = "none";
  }

  if (!valid) return;

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  const applicantName = document.getElementById("applicant_name").value.trim() || "Applicant";

  // HEADER
  doc.setFillColor(44, 62, 80);
  doc.rect(0, 0, 210, 25, "F");
  doc.setTextColor(255, 255, 255);
  doc.setFont("times", "bold");
  doc.setFontSize(16);
  doc.text("Samiksha Garg & Associates", 105, 12, { align: "center" });
  doc.setFontSize(10);
  doc.setFont("times", "normal");
  doc.text("BS 4L, Malibu Town, Sector-47, Gurugram, HR-1220018", 205, 20, { align: "right" });
  doc.setTextColor(0, 0, 0);

  // Applicant
  doc.setFont("times", "bold");
  doc.setFontSize(12);
  doc.text("Applicant Name: ", 14, 35);
  doc.setFont("times", "normal");
  doc.text(applicantName, 60, 35);

  doc.setLineWidth(0.3);
  doc.line(10, 40, 200, 40);

  let visitDate = getIndiaDate();

  let natureRes = document.getElementById("nature_residence").value;
  if (natureRes === "Other") natureRes += " (" + document.getElementById("other_nature").value + ")";

  let relationRes = document.getElementById("relation").value;
  if (relationRes === "Other") relationRes += " (" + document.getElementById("other_relation").value + ")";

  let verifierInput = document.getElementById("verifier_res").value.trim();
  let verifierSelect = document.getElementById("verifier_select").value;
  let verifierFinal = verifierInput ? verifierInput : (verifierSelect || "");

  // MAIN TABLE
  doc.autoTable({
    startY: 45,
    theme: "grid",
    head: [['S. No', 'Particulars', 'Details']],
    body: [
      ['1', 'Present Residence Address Tallied', document.getElementById("present_address").value],
      ['2', "Applicant's Residence Landmark", document.getElementById("landmark").value],
      ['3', 'Name and Stay Confirmed? Staying Since?', 
        "Stay Confirmed: " + document.getElementById("stay_confirmed").value + 
        ", Staying Since: " + document.getElementById("staying_since").value],
      ['4', 'Nature of Residence', natureRes],
      ['5', 'Name Plate Seen in the Building', document.getElementById("name_plate").value],
      ['6', 'If yes, does name tally?', document.getElementById("plate_tally").value],
      ['7', 'Name & Address of Person Contacted', document.getElementById("person_contacted").value],
      ['8', 'Relation with Applicant, if any', relationRes],
      ['9', 'Date of Visit', visitDate],
      ['10', 'Name of Verifier & Remarks', verifierFinal + " | Notes: " + document.getElementById("remarks").value]
    ],
    styles: { fontSize: 11, cellPadding: 4, lineColor: [0,0,0], lineWidth: 0.1 },
    headStyles: { fillColor: [44,62,80], textColor: [255,255,255], fontStyle: "bold" },
    bodyStyles: { textColor: 30 },
    alternateRowStyles: { fillColor: [245,245,245] }
  });

  let finalY = doc.lastAutoTable.finalY + 10;

  // REFERENCE DETAILS (IN EXACT FORMAT)
  doc.setFont("times", "bold");
  doc.setFontSize(12);
  doc.text("Reference Details:", 14, finalY);

  doc.setFont("times", "normal");
  doc.text("1. " + ref1Name + " - " + ref1Number, 14, finalY + 10);
  doc.text("2. " + ref2Name + " - " + ref2Number, 14, finalY + 18);

  // FOOTER
  doc.setLineWidth(0.2);
  let footY = finalY + 30;
  doc.line(10, footY, 200, footY);

  doc.setFontSize(9);
  doc.setTextColor(80);
  doc.text("Confidential Report - Generated by Verification System", 105, footY + 8, { align: "center" });

  doc.save(`${applicantName}_BOI_Residence.pdf`);
}
</script>
</body>
</html>
